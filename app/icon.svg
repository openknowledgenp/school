<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="white"/>
  <!-- Cyan blades at cardinal directions (top, right, bottom, left) -->
  <rect x="88" y="8" width="24" height="68" fill="#00CFFF" stroke="#000" stroke-width="6"/>
  <g transform="rotate(90,100,100)"><rect x="88" y="8" width="24" height="68" fill="#00CFFF" stroke="#000" stroke-width="6"/></g>
  <g transform="rotate(180,100,100)"><rect x="88" y="8" width="24" height="68" fill="#00CFFF" stroke="#000" stroke-width="6"/></g>
  <g transform="rotate(270,100,100)"><rect x="88" y="8" width="24" height="68" fill="#00CFFF" stroke="#000" stroke-width="6"/></g>
  <!-- White blades at diagonal directions -->
  <g transform="rotate(45,100,100)"><rect x="88" y="8" width="24" height="68" fill="#fff" stroke="#000" stroke-width="6"/></g>
  <g transform="rotate(135,100,100)"><rect x="88" y="8" width="24" height="68" fill="#fff" stroke="#000" stroke-width="6"/></g>
  <g transform="rotate(225,100,100)"><rect x="88" y="8" width="24" height="68" fill="#fff" stroke="#000" stroke-width="6"/></g>
  <g transform="rotate(315,100,100)"><rect x="88" y="8" width="24" height="68" fill="#fff" stroke="#000" stroke-width="6"/></g>
  <!-- Center circle -->
  <circle cx="100" cy="100" r="26" fill="white" stroke="#000" stroke-width="6"/>
</svg>
